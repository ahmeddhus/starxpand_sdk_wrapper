name: starxpand_sdk_wrapper
description: "A Flutter plugin that provides a simple interface to Star Micronics receipt printers using the official StarXpand SDK for Android and iOS."
version: 1.0.3
homepage: "https://github.com/orioletech/starxpand_sdk_wrapper"

environment:
  sdk: ^3.9.2
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  pigeon: ^26.0.1
  plugin_platform_interface: ^2.0.2
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.orioletech.starxpand_sdk_wrapper
        pluginClass: StarxpandSdkWrapperPlugin
      ios:
        pluginClass: StarxpandSdkWrapperPlugin
